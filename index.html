<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <h1>Temperature Converter</h1>
        <div class="container">
        <div class="input-group">
            <label for="celsius" style="font-size: 2rem;">Celsius:</label>
            <input type="number" id="celsius" placeholder="Enter value">
        </div>

        <div class="input-group">
            <label for="fahrenheit" style="font-size: 2rem;">Fahrenheit:</label>
            <input type="number" id="fahrenheit" placeholder="Enter value">
        </div>

        <div class="input-group">
            <label for="kelvin" style="font-size: 2rem;">Kelvin:</label>
            <input type="number" id="kelvin" placeholder="Enter value">
        </div>
        </div>

        <button onclick="convertTemperature()" style="font-family: 'Times New Roman', Times, serif; font-size: 2rem;" >Convert</button>



    <script src="script.js"></script>
</body>
</html>
